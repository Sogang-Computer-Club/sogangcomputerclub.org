# 보안 스캔 워크플로우
# 목적: 코드, 의존성, 시크릿, Docker 이미지의 보안 취약점을 자동으로 탐지
#
# 스캔 종류:
# 1. Trivy FS: 소스 코드와 의존성 파일의 알려진 취약점(CVE) 검사
# 2. Trivy Config: Dockerfile, Kubernetes 매니페스트 등 설정 파일 보안 검사
# 3. Dependency Review: PR에서 추가된 의존성의 라이선스/취약점 검사
# 4. TruffleHog: 하드코딩된 시크릿(API 키, 비밀번호) 탐지
# 5. CodeQL: 소스 코드 정적 분석 (SQL 인젝션, XSS 등)
name: Security Scanning

on:
  push:
    branches: [master, develop, staging]
  pull_request:
    branches: [master, develop]
  # 매일 새벽 2시(UTC) 정기 스캔: 새로 발견된 CVE를 빠르게 탐지
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

# 최소 권한 원칙: 필요한 권한만 부여
permissions:
  contents: read
  security-events: write  # GitHub Security 탭에 결과 업로드용

jobs:
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in filesystem mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-fs"

      - name: Generate vulnerability report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          output: "trivy-fs-report.txt"

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt

  trivy-config-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-config-results.sarif"
          exit-code: "0"

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-config-results.sarif"
          category: "trivy-config"

  # 의존성 검토: PR에서 새로 추가된 패키지의 보안/라이선스 검사
  # PR에서만 실행 (변경된 의존성만 검사)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # moderate 이상 취약점 발견 시 PR 차단
          fail-on-severity: moderate
          # GPL 라이선스 차단: 상용 프로젝트에 GPL 코드 포함 시 전체 코드 공개 의무 발생
          deny-licenses: GPL-2.0, GPL-3.0

  # 시크릿 스캔: 실수로 커밋된 API 키, 비밀번호 등 탐지
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 전체 히스토리 검사: 과거 커밋에서 삭제했어도 Git 히스토리에 남아있음
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # only-verified: 실제로 유효한 시크릿만 보고 (오탐 감소)
          extra_args: --only-verified

  docker-image-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    continue-on-error: true  # non-blocking: 경고만 표시
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        image: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image == 'backend' && '.' || './frontend' }}
          file: ${{ matrix.image == 'backend' && './Dockerfile' || './frontend/Dockerfile' }}
          tags: ${{ matrix.image }}:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:scan
          format: "sarif"
          output: "trivy-${{ matrix.image }}-image.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.image }}-image.sarif"
          category: "trivy-${{ matrix.image }}-image"

      - name: Generate detailed image report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:scan
          format: "table"
          output: "trivy-${{ matrix.image }}-detailed.txt"

      - name: Upload detailed report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-${{ matrix.image }}-image-report
          path: "trivy-${{ matrix.image }}-detailed.txt"

      - name: Check for critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:scan
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

  # CodeQL: GitHub의 시맨틱 코드 분석 엔진
  # SQL 인젝션, XSS, 경로 순회 등 보안 취약점 패턴 탐지
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      # fail-fast: false - 한 언어 실패해도 다른 언어 분석 계속
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended: OWASP Top 10 등 확장된 보안 쿼리 포함
          # security-and-quality: 코드 품질 문제도 함께 검사
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - '**/node_modules'
              - '**/dist'
              - '**/build'
              - '**/.svelte-kit'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        if: matrix.language == 'python'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      [
        trivy-fs-scan,
        trivy-config-scan,
        secret-scan,
        docker-image-scan,
        codeql-analysis,
      ]
    if: always()

    steps:
      - name: Generate security summary
        run: |
          echo "# Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Status" >> $GITHUB_STEP_SUMMARY
          echo "- Filesystem Scan: ${{ needs.trivy-fs-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Config Scan: ${{ needs.trivy-config-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Image Scan: ${{ needs.docker-image-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL Analysis: ${{ needs.codeql-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for failures, treating 'skipped' as success
          # docker-image-scan은 non-blocking이므로 제외
          FAILED=0
          if [ "${{ needs.trivy-fs-scan.result }}" == "failure" ]; then FAILED=1; fi
          if [ "${{ needs.trivy-config-scan.result }}" == "failure" ]; then FAILED=1; fi
          if [ "${{ needs.secret-scan.result }}" == "failure" ]; then FAILED=1; fi
          # docker-image-scan: non-blocking (continue-on-error: true)
          if [ "${{ needs.codeql-analysis.result }}" == "failure" ]; then FAILED=1; fi

          if [ $FAILED -eq 1 ]; then
            echo "⚠️ **Security issues detected!** Please review the scan results." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All security scans passed!**" >> $GITHUB_STEP_SUMMARY
          fi
