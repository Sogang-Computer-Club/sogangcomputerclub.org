# 프로덕션 Docker Compose (Arch Linux LXC 서버)
#
# 기본 실행: docker compose -f deploy/docker-compose.yml --env-file .env up -d
# 모니터링 포함: docker compose -f deploy/docker-compose.yml --env-file .env --profile monitoring up -d
#
# NOTE: LXC 환경에서 iptables NAT 불가 — nginx/certbot은 network_mode: host 사용

services:
  backend:
    build:
      context: ..
      network: host
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
    volumes:
      - ../app:/code/app
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  frontend:
    build:
      context: ../frontend
      network: host
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - HOST=${HOST}
      - PORT=${PORT}
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx-sogangcomputerclub.conf:/etc/nginx/conf.d/sogangcomputerclub.conf:ro
      - ../scripts/nginx.sh:/nginx.sh
      - certbot_certs:/etc/nginx/certs
    entrypoint: /bin/sh
    command: -c "/nginx.sh"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

  certbot:
    image: certbot/certbot
    network_mode: host
    volumes:
      - certbot_certs:/etc/nginx/certs
      - ../scripts/certbot.sh:/certbot.sh
    entrypoint: /bin/sh
    command: -c "/certbot.sh"
    depends_on:
      nginx:
        condition: service_started

  # ===== 모니터링 스택 (Prometheus + Grafana) =====
  # 사용: docker compose -f deploy/docker-compose.yml --env-file .env --profile monitoring up -d

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    profiles: [monitoring]
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - app-network
    depends_on:
      - postgres

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    profiles: [monitoring]
    ports:
      - "9113:9113"
    environment:
      - SCRAPE_URI=http://127.0.0.1:80/stub_status
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - app-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
    networks:
      - app-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  certbot_certs:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: docker1
