# 로컬 개발용 Docker Compose
# 모든 서비스가 컨테이너로 실행됨 (AWS 서비스 없음)
#
# 기본 실행: docker-compose up
#   - 핵심 서비스만 실행 (backend, postgres, frontend, nginx)
#
# Kafka 포함: docker-compose --profile kafka up
# 모니터링 포함: docker-compose --profile monitoring up
# 전체 실행: docker-compose --profile kafka --profile monitoring up

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - EVENT_BACKEND=${EVENT_BACKEND:-null}  # 기본: null (이벤트 시스템 비활성화)
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9093}
    depends_on:
      - postgres
    volumes:
      - ./app:/code/app  # 핫 리로드: 코드 변경 시 자동 반영
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Zookeeper - Kafka 클러스터 관리 (Kafka 의존성)
  # 사용: docker-compose --profile kafka up
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    profiles: [kafka]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  # Kafka - 로컬 개발용 이벤트 브로커
  # 프로덕션에서는 SQS 사용 (EVENT_BACKEND=sqs)
  # 사용: docker-compose --profile kafka up
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    profiles: [kafka]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # 호스트에서 접근용 (EXTERNAL)
      - "9093:9093"   # 컨테이너 간 통신용 (INTERNAL)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - HOST=${HOST}
      - PORT=${PORT}
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-sogangcomputerclub.conf:/etc/nginx/conf.d/sogangcomputerclub.conf:ro
      - ./nginx.sh:/nginx.sh
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "/nginx.sh"
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - ./frontend/build:/var/www/html
      - ./certbot.sh:/certbot.sh
    entrypoint: /bin/sh
    command: -c "/certbot.sh"
    networks:
      - app-network
    depends_on:
      - nginx
    links:
      - nginx

  # ===== 모니터링 스택 (Prometheus + Grafana) =====
  # 사용: docker-compose --profile monitoring up

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    profiles: [monitoring]
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - app-network
    depends_on:
      - postgres

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    profiles: [monitoring]
    ports:
      - "9113:9113"
    environment:
      - SCRAPE_URI=http://nginx:80/stub_status
    networks:
      - app-network
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - app-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - app-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  certbot_certs:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: docker1
