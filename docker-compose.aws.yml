# AWS 프로덕션 배포용 Docker Compose
# 외부 서비스: RDS (PostgreSQL), SQS (이벤트)
# 컨테이너 서비스: Backend, Frontend, Nginx

services:
  backend:
    image: ${ECR_REGISTRY}/${PROJECT_NAME}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "8000"  # Nginx를 통해 외부 노출, 직접 포트 바인딩 안함
    environment:
      # 데이터베이스 - AWS Secrets Manager에서 .env로 주입
      - DATABASE_URL=${DATABASE_URL}
      # SQS - Kafka 대체 (비용 절감)
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - EVENT_BACKEND=sqs
      # 앱 설정
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - CORS_ORIGINS=${CORS_ORIGINS:-https://sogangcomputerclub.org,https://www.sogangcomputerclub.org}
    networks:
      - sgcc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  # 앱 초기화 대기 시간
    logging:
      driver: awslogs  # CloudWatch Logs로 직접 전송
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: /aws/ec2/sgcc
        awslogs-stream: backend
        awslogs-create-group: "true"

  frontend:
    image: ${ECR_REGISTRY}/${PROJECT_NAME}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - ORIGIN=https://sogangcomputerclub.org
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    depends_on:
      - backend
    networks:
      - sgcc-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: /aws/ec2/sgcc
        awslogs-stream: frontend
        awslogs-create-group: "true"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-aws.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/html
    networks:
      - sgcc-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - 메트릭 수집 (선택 사항, 리소스 절약 시 제거 가능)
  # 실행: docker compose --profile monitoring up
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"  # 7일간 메트릭 보관
    networks:
      - sgcc-network
    profiles:
      - monitoring  # --profile monitoring 옵션으로만 실행

  # Grafana - 대시보드 (선택 사항)
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - sgcc-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  certbot_www:
  prometheus_data:
  grafana_data:

networks:
  sgcc-network:
    driver: bridge
